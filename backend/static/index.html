<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>INEOS Fleet Management</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>tailwind.config={theme:{extend:{colors:{ineos:{red:'#FF4639',onyx:'#1D1D1D',charcoal:'#171717',mushroom:'#D9D7D0','mushroom-light':'#FAFAF9',dove:'#E9E8E5','iron-smoke':'#606060','silver-dust':'#9F9F9F'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
</head>
<body class="bg-ineos-charcoal text-white font-sans min-h-screen">
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,createElement:h}=React;

// API client
const API={
  token:localStorage.getItem('fleet_token'),
  async req(path,opts={}){
    const headers={'Content-Type':'application/json'};
    if(this.token)headers['Authorization']='Bearer '+this.token;
    const r=await fetch(path,{...opts,headers});
    if(r.status===401){this.token=null;localStorage.removeItem('fleet_token');location.reload()}
    return r.json();
  },
  get(p){return this.req(p)},
  post(p,d){return this.req(p,{method:'POST',body:JSON.stringify(d)})},
  put(p,d){return this.req(p,{method:'PUT',body:JSON.stringify(d)})},
  del(p){return this.req(p,{method:'DELETE'})},
  async upload(p,file){
    const fd=new FormData();fd.append('file',file);
    const r=await fetch(p,{method:'POST',body:fd,headers:this.token?{'Authorization':'Bearer '+this.token}:{}});
    return r.json();
  },
  login(u,pw){return this.req('/api/auth/login',{method:'POST',body:JSON.stringify({username:u,password:pw})})},
};

const CATS={marketing_pr:'Marketing & PR',demo:'Demo',iecp:'IECP',pto:'PTO',internal:'Internal',navs:'NAVS',de_fleet:'De-Fleet'};
const CAT_COLORS={marketing_pr:'bg-purple-500',demo:'bg-blue-500',iecp:'bg-green-500',pto:'bg-amber-500',internal:'bg-cyan-500',navs:'bg-pink-500',de_fleet:'bg-gray-500'};

function LoginPage({onLogin}){
  const[u,setU]=useState('');const[p,setP]=useState('');const[err,setErr]=useState('');
  const submit=async e=>{e.preventDefault();setErr('');try{const r=await API.login(u,p);if(r.access_token){API.token=r.access_token;localStorage.setItem('fleet_token',r.access_token);onLogin(r)}else setErr(r.detail||'Login failed')}catch{setErr('Connection error')}};
  return <div className="min-h-screen flex items-center justify-center">
    <div className="bg-white text-ineos-onyx rounded-xl p-8 w-96 shadow-2xl">
      <div className="flex items-center gap-2 mb-2"><div className="w-1 h-8 bg-ineos-red rounded"></div><h1 className="text-2xl font-bold tracking-tight">INEOS GRENADIER</h1></div>
      <p className="text-ineos-iron-smoke text-sm mb-6">Fleet Management System</p>
      <form onSubmit={submit}>
        <label className="block text-sm font-medium mb-1">Username</label>
        <input className="w-full border border-ineos-dove rounded-lg px-3 py-2 mb-4 text-sm" value={u} onChange={e=>setU(e.target.value)} placeholder="Enter username"/>
        <label className="block text-sm font-medium mb-1">Password</label>
        <input className="w-full border border-ineos-dove rounded-lg px-3 py-2 mb-4 text-sm" type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="Enter password"/>
        {err&&<p className="text-red-600 text-xs mb-2">{err}</p>}
        <button className="w-full bg-ineos-charcoal text-white rounded-lg py-2.5 font-semibold text-sm hover:bg-ineos-onyx">Sign In</button>
      </form>
      <p className="text-xs text-ineos-silver-dust mt-4 text-center">Demo: admin/admin123</p>
    </div>
  </div>;
}

function KPI({label,value,color}){return <div className="bg-white/5 border border-white/10 rounded-xl p-5"><p className="text-ineos-silver-dust text-xs uppercase tracking-wider">{label}</p><p className={`text-3xl font-bold mt-1 ${color||'text-white'}`}>{value}</p></div>}

function DashboardPage(){
  const[s,setS]=useState(null);
  useEffect(()=>{API.get('/api/dashboard/stats').then(setS)},[]);
  if(!s)return <p className="p-8 text-ineos-silver-dust">Loading...</p>;
  return <div className="p-6 space-y-6">
    <h2 className="text-xl font-bold">Dashboard</h2>
    <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
      <KPI label="Total Vehicles" value={s.total_vehicles}/>
      <KPI label="Active" value={s.active_vehicles} color="text-green-400"/>
      <KPI label="Returned" value={s.returned_vehicles} color="text-amber-400"/>
      <KPI label="Drivers" value={s.total_drivers} color="text-blue-400"/>
      <KPI label="Assignments" value={s.active_assignments} color="text-purple-400"/>
    </div>
    <div className="bg-white/5 border border-white/10 rounded-xl p-5">
      <h3 className="text-sm font-semibold text-ineos-silver-dust uppercase tracking-wider mb-3">By Category</h3>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {Object.entries(CATS).map(([k,label])=><div key={k} className="flex items-center gap-2"><span className={`w-3 h-3 rounded-full ${CAT_COLORS[k]}`}></span><span className="text-sm">{label}: <strong>{s.by_category[k]||0}</strong></span></div>)}
      </div>
    </div>
  </div>;
}

function VehiclesPage(){
  const[items,setItems]=useState([]);const[total,setTotal]=useState(0);const[search,setSearch]=useState('');const[cat,setCat]=useState('');const[editing,setEditing]=useState(null);
  const load=()=>API.get(`/api/vehicles?search=${search}&category=${cat}&limit=200`).then(r=>{setItems(r.items);setTotal(r.total)});
  useEffect(()=>{load()},[search,cat]);
  return <div className="p-6 space-y-4">
    <div className="flex items-center justify-between"><h2 className="text-xl font-bold">Vehicles <span className="text-ineos-silver-dust font-normal text-base">({total})</span></h2>
      <button onClick={()=>setEditing({vin:'',year:'',model:'Grenadier',trim:'',color:'',category:'demo',status:'active',location_city:'',location_state:'',dealer_name:'',plate_number:'',notes:''})} className="bg-ineos-red text-white text-sm px-4 py-2 rounded-lg font-medium hover:bg-red-600">+ Add Vehicle</button>
    </div>
    <div className="flex gap-3">
      <input className="bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-sm flex-1" placeholder="Search VIN, dealer, city..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <select className="bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-sm" value={cat} onChange={e=>setCat(e.target.value)}>
        <option value="">All Categories</option>{Object.entries(CATS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
      </select>
    </div>
    <div className="bg-white/5 border border-white/10 rounded-xl overflow-hidden">
      <table className="w-full text-sm"><thead><tr className="border-b border-white/10 text-ineos-silver-dust text-xs uppercase tracking-wider">
        <th className="text-left p-3">VIN</th><th className="text-left p-3">Year</th><th className="text-left p-3">Trim</th><th className="text-left p-3">Category</th><th className="text-left p-3">Status</th><th className="text-left p-3">Location</th><th className="text-left p-3">Dealer</th><th className="p-3"></th>
      </tr></thead><tbody>
        {items.map(v=><tr key={v.id} className="border-b border-white/5 hover:bg-white/5">
          <td className="p-3 font-mono text-xs">{v.vin}</td><td className="p-3">{v.year}</td><td className="p-3">{v.trim}</td>
          <td className="p-3"><span className={`text-xs px-2 py-0.5 rounded-full ${CAT_COLORS[v.category]||'bg-gray-500'} text-white`}>{CATS[v.category]||v.category}</span></td>
          <td className="p-3"><span className={`text-xs ${v.status==='active'?'text-green-400':v.status==='returned'?'text-amber-400':'text-ineos-silver-dust'}`}>{v.status}</span></td>
          <td className="p-3">{[v.location_city,v.location_state].filter(Boolean).join(', ')}</td>
          <td className="p-3 text-xs">{v.dealer_name}</td>
          <td className="p-3"><button onClick={()=>setEditing(v)} className="text-ineos-red text-xs hover:underline">Edit</button></td>
        </tr>)}
      </tbody></table>
    </div>
    {editing&&<VehicleModal vehicle={editing} onClose={()=>{setEditing(null);load()}}/>}
  </div>;
}

function VehicleModal({vehicle,onClose}){
  const[d,setD]=useState({...vehicle});const isNew=!d.id;
  const save=async()=>{if(isNew)await API.post('/api/vehicles',d);else await API.put(`/api/vehicles/${d.id}`,d);onClose()};
  const field=(label,key,opts)=><div><label className="block text-xs text-ineos-silver-dust mb-1">{label}</label>
    {opts?<select className="w-full bg-white/10 border border-white/20 rounded px-2 py-1.5 text-sm" value={d[key]||''} onChange={e=>setD({...d,[key]:e.target.value})}>{opts.map(([k,v])=><option key={k} value={k}>{v}</option>)}</select>
    :<input className="w-full bg-white/10 border border-white/20 rounded px-2 py-1.5 text-sm" value={d[key]||''} onChange={e=>setD({...d,[key]:e.target.value})}/>}</div>;
  return <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50" onClick={onClose}>
    <div className="bg-ineos-charcoal border border-white/20 rounded-xl p-6 w-[500px] max-h-[80vh] overflow-y-auto space-y-3" onClick={e=>e.stopPropagation()}>
      <h3 className="text-lg font-bold mb-2">{isNew?'Add Vehicle':'Edit Vehicle'}</h3>
      <div className="grid grid-cols-2 gap-3">
        {field('VIN','vin')}{field('Year','year')}{field('Model','model')}{field('Trim','trim')}
        {field('Color','color')}{field('Ext Color','ext_color')}
        {field('Category','category',Object.entries(CATS))}
        {field('Status','status',[['active','Active'],['returned','Returned'],['in_transit','In Transit'],['maintenance','Maintenance']])}
        {field('City','location_city')}{field('State','location_state')}
        {field('Dealer','dealer_name')}{field('Plate','plate_number')}
      </div>
      {field('Notes','notes')}
      <div className="flex gap-2 pt-2">
        <button onClick={save} className="bg-ineos-red text-white text-sm px-4 py-2 rounded-lg font-medium flex-1">Save</button>
        <button onClick={onClose} className="bg-white/10 text-white text-sm px-4 py-2 rounded-lg flex-1">Cancel</button>
      </div>
    </div>
  </div>;
}

function DriversPage(){
  const[items,setItems]=useState([]);const[search,setSearch]=useState('');
  const load=()=>API.get(`/api/drivers?search=${search}`).then(setItems);
  useEffect(()=>{load()},[search]);
  return <div className="p-6 space-y-4">
    <h2 className="text-xl font-bold">Drivers</h2>
    <input className="bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-sm w-full max-w-md" placeholder="Search drivers..." value={search} onChange={e=>setSearch(e.target.value)}/>
    <div className="bg-white/5 border border-white/10 rounded-xl overflow-hidden">
      <table className="w-full text-sm"><thead><tr className="border-b border-white/10 text-ineos-silver-dust text-xs uppercase tracking-wider">
        <th className="text-left p-3">Name</th><th className="text-left p-3">Email</th><th className="text-left p-3">Phone</th><th className="text-left p-3">Department</th>
      </tr></thead><tbody>
        {items.map(d=><tr key={d.id} className="border-b border-white/5 hover:bg-white/5">
          <td className="p-3 font-medium">{d.name}</td><td className="p-3 text-ineos-silver-dust">{d.email}</td><td className="p-3">{d.phone}</td><td className="p-3">{d.department}</td>
        </tr>)}
      </tbody></table>
    </div>
  </div>;
}

function DealersPage(){
  const[items,setItems]=useState([]);
  useEffect(()=>{API.get('/api/dealers').then(setItems)},[]);
  return <div className="p-6 space-y-4">
    <h2 className="text-xl font-bold">Dealer Directory</h2>
    <div className="bg-white/5 border border-white/10 rounded-xl overflow-hidden">
      <table className="w-full text-sm"><thead><tr className="border-b border-white/10 text-ineos-silver-dust text-xs uppercase tracking-wider">
        <th className="text-left p-3">Dealer</th><th className="text-left p-3">Region</th><th className="text-left p-3">Location</th><th className="text-left p-3">Contact</th><th className="text-left p-3">Phone</th><th className="text-left p-3">Email</th>
      </tr></thead><tbody>
        {items.map(d=><tr key={d.id} className="border-b border-white/5 hover:bg-white/5">
          <td className="p-3 font-medium">{d.name}</td><td className="p-3">{d.region}</td><td className="p-3">{[d.city,d.state].filter(Boolean).join(', ')}</td>
          <td className="p-3">{d.contact_name}</td><td className="p-3 text-xs">{d.contact_phone}</td><td className="p-3 text-xs text-ineos-silver-dust">{d.contact_email}</td>
        </tr>)}
      </tbody></table>
    </div>
  </div>;
}

function ImportPage(){
  const[file,setFile]=useState(null);const[status,setStatus]=useState(null);const[loading,setLoading]=useState(false);
  const upload=async()=>{if(!file)return;setLoading(true);setStatus(null);try{const r=await API.upload('/api/import/fleet-tracker',file);setStatus(r);setFile(null)}catch(e){setStatus({error:e.message})}finally{setLoading(false)}};
  return <div className="p-6 space-y-6">
    <h2 className="text-xl font-bold">Import Fleet Tracker</h2>
    <div className="bg-white/5 border border-white/10 rounded-xl p-8 max-w-lg">
      <p className="text-sm text-ineos-silver-dust mb-4">Upload your Full Fleet Tracker Excel file (.xlsx) to import vehicles and drivers into the database.</p>
      <input type="file" accept=".xlsx,.xls" onChange={e=>setFile(e.target.files[0])} className="text-sm mb-4 block"/>
      {file&&<p className="text-sm mb-4 text-green-400">{file.name} ({(file.size/1024/1024).toFixed(1)} MB)</p>}
      <button onClick={upload} disabled={!file||loading} className="bg-ineos-red text-white text-sm px-6 py-2.5 rounded-lg font-medium disabled:opacity-50">{loading?'Importing...':'Import Data'}</button>
      {status&&!status.error&&<div className="mt-4 p-4 bg-green-500/10 border border-green-500/30 rounded-lg text-sm">
        <p className="text-green-400 font-medium">Import complete!</p>
        <p>Vehicles imported: {status.vehicles_imported}</p>
        <p>Drivers imported: {status.drivers_imported}</p>
        <p>Sheets processed: {status.sheets_processed?.join(', ')}</p>
      </div>}
      {status?.error&&<p className="mt-4 text-red-400 text-sm">{status.error}</p>}
    </div>
  </div>;
}

function App(){
  const[user,setUser]=useState(API.token?{loggedIn:true}:null);
  const[page,setPage]=useState('dashboard');
  if(!user)return <LoginPage onLogin={r=>setUser({...r,loggedIn:true})}/>;
  const nav=[['dashboard','Dashboard'],['vehicles','Vehicles'],['drivers','Drivers'],['dealers','Dealers'],['import','Import']];
  const pages={dashboard:<DashboardPage/>,vehicles:<VehiclesPage/>,drivers:<DriversPage/>,dealers:<DealersPage/>,import:<ImportPage/>};
  return <div className="min-h-screen flex">
    <aside className="w-56 bg-ineos-onyx border-r border-white/10 flex flex-col">
      <div className="p-4 border-b border-white/10">
        <div className="flex items-center gap-2"><div className="w-8 h-8 bg-ineos-red rounded flex items-center justify-center text-xs font-bold">IN</div><div><div className="text-sm font-semibold">Fleet Manager</div><div className="text-[10px] text-ineos-silver-dust uppercase tracking-wider">INEOS Americas</div></div></div>
      </div>
      <nav className="flex-1 p-3 space-y-1">
        {nav.map(([k,label])=><button key={k} onClick={()=>setPage(k)} className={`w-full text-left text-sm px-3 py-2 rounded-lg transition ${page===k?'bg-white/10 text-white font-medium':'text-ineos-silver-dust hover:text-white hover:bg-white/5'}`}>{label}</button>)}
      </nav>
      <div className="p-3 border-t border-white/10">
        <button onClick={()=>{API.token=null;localStorage.removeItem('fleet_token');setUser(null)}} className="text-xs text-ineos-silver-dust hover:text-white">Sign Out</button>
      </div>
    </aside>
    <main className="flex-1 overflow-y-auto">{pages[page]}</main>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
